<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d14"/>
      <stop offset="100%" style="stop-color:#141c2a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22ffa8"/>
      <stop offset="100%" style="stop-color:#0090cc"/>
    </linearGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.2"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.15"/>
  <!-- Center node -->
  <circle cx="256" cy="256" r="52" fill="url(#glow)" opacity="0.15" filter="url(#f)"/>
  <circle cx="256" cy="256" r="52" fill="none" stroke="url(#glow)" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="18" fill="url(#glow)" opacity="0.9"/>
  <!-- Satellite nodes -->
  <!-- AWS (top right) -->
  <circle cx="376" cy="150" r="22" fill="#ff9900" opacity="0.15" filter="url(#f)"/>
  <circle cx="376" cy="150" r="22" fill="none" stroke="#ff9900" stroke-width="2"/>
  <circle cx="376" cy="150" r="8" fill="#ff9900" opacity="0.85"/>
  <!-- IBM (left) -->
  <circle cx="120" cy="256" r="22" fill="#4589ff" opacity="0.15" filter="url(#f)"/>
  <circle cx="120" cy="256" r="22" fill="none" stroke="#4589ff" stroke-width="2"/>
  <circle cx="120" cy="256" r="8" fill="#4589ff" opacity="0.85"/>
  <!-- Azure (bottom) -->
  <circle cx="256" cy="390" r="22" fill="#0078d4" opacity="0.15" filter="url(#f)"/>
  <circle cx="256" cy="390" r="22" fill="none" stroke="#0078d4" stroke-width="2"/>
  <circle cx="256" cy="390" r="8" fill="#0078d4" opacity="0.85"/>
  <!-- ServiceNow (top left) -->
  <circle cx="148" cy="138" r="16" fill="#62d84e" opacity="0.15"/>
  <circle cx="148" cy="138" r="16" fill="none" stroke="#62d84e" stroke-width="1.5"/>
  <circle cx="148" cy="138" r="6" fill="#62d84e" opacity="0.75"/>
  <!-- Palo Alto (right) -->
  <circle cx="390" cy="310" r="16" fill="#ef5925" opacity="0.15"/>
  <circle cx="390" cy="310" r="16" fill="none" stroke="#ef5925" stroke-width="1.5"/>
  <circle cx="390" cy="310" r="6" fill="#ef5925" opacity="0.75"/>
  <!-- HashiCorp (bottom left) -->
  <circle cx="148" cy="370" r="16" fill="#7b42bc" opacity="0.15"/>
  <circle cx="148" cy="370" r="16" fill="none" stroke="#7b42bc" stroke-width="1.5"/>
  <circle cx="148" cy="370" r="6" fill="#7b42bc" opacity="0.75"/>
  <!-- Connection lines -->
  <line x1="256" y1="256" x2="376" y2="150" stroke="url(#glow)" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="256" x2="120" y2="256" stroke="#4589ff" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="256" x2="256" y2="390" stroke="#0078d4" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="256" x2="148" y2="138" stroke="#62d84e" stroke-width="1" opacity="0.25"/>
  <line x1="256" y1="256" x2="390" y2="310" stroke="#ef5925" stroke-width="1" opacity="0.25"/>
  <line x1="256" y1="256" x2="148" y2="370" stroke="#7b42bc" stroke-width="1" opacity="0.25"/>
</svg>
