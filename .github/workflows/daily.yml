name: ArchBrief Daily Brief

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate even if today exists'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate daily brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_REGENERATE: ${{ inputs.force_regenerate || 'false' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
        run: python .github/scripts/generate_daily.py

      - name: Verify output
        id: verify
        run: |
          if [ -f "daily.json" ]; then
            echo "generated=true" >> $GITHUB_OUTPUT
            python3 -c "import json; f=open('daily.json'); d=json.load(f); f.close(); print('Date:    ', d.get('date','?')); print('Articles:', len(d.get('digest',{}).get('articles',[]))); print('APS:     ', len(d.get('aps',{}).get('irapStatus',[])), 'vendors'); print('Changes: ', len(d.get('apsChanges',[])), 'APS changes'); print('Explorer:', len(d.get('explorer',{}).get('articles',[])), 'articles'); errors=d.get('errors',[]); errors and print('Errors:  ', errors)"
          else
            echo "generated=false" >> $GITHUB_OUTPUT
            echo "daily.json not created"
            exit 1
          fi

      - name: Commit outputs
        if: steps.verify.outputs.generated == 'true'
        run: |
          git config --local user.email "archbrief-bot@github-actions"
          git config --local user.name "ArchBrief Daily Bot"
          git add daily.json history.json weekly_summary.json 2>/dev/null || git add daily.json history.json 2>/dev/null || git add daily.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            AEST_DATE=$(TZ='Australia/Sydney' date '+%A %d %B %Y')
            IS_FRIDAY=$(TZ='Australia/Sydney' date '+%u')
            if [ "$IS_FRIDAY" = "5" ]; then
              git commit -m "Daily brief + Weekly summary: ${AEST_DATE}"
            else
              git commit -m "Daily brief: ${AEST_DATE}"
            fi
            git push
            echo "Committed and pushed"
          fi

      - name: Job summary
        if: always()
        run: |
          echo "### ArchBrief Daily Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(TZ='Australia/Sydney' date '+%A %d %B %Y at %H:%M AEST')" >> $GITHUB_STEP_SUMMARY
          if [ -f "daily.json" ]; then
            echo "**Status:** Success" >> $GITHUB_STEP_SUMMARY
            python3 -c "import json; f=open('daily.json'); d=json.load(f); f.close(); ctx=d.get('context',{}); changes=d.get('apsChanges',[]); print('**Articles:**', len(d.get('digest',{}).get('articles',[]))); print('**Active projects:**', ctx.get('activeProjects',0)); print('**Feedback:**', ctx.get('feedbackUsed','none')); print('**History days:**', ctx.get('historyDays',0)); changes and print('**APS Changes:**', len(changes), 'detected')" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** Failed - daily.json not created" >> $GITHUB_STEP_SUMMARY
          fi
